

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>ビジネス手相診断</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

:root {
  --sky: #5ba3d9;
  --sky-light: #a8d4f0;
  --sky-pale: #e8f4fc;
  --sky-bg: #f0f8ff;
  --navy: #1a3a5c;
  --navy-mid: #2a5280;
  --white: #ffffff;
  --text-dark: #1a3a5c;
  --text-mid: #4a6a8a;
  --text-light: #7a9ab8;
  --border: rgba(91,163,217,0.28);
  --shadow: rgba(91,163,217,0.14);
  --line: #06C755;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--sky-bg);
  color: var(--text-dark);
  min-height: 100vh;
  font-size: 18px;
  -webkit-text-size-adjust: none;
  text-size-adjust: none;
}
.header {
  background: linear-gradient(160deg, #f0f8ff 0%, #d8eef9 50%, #bfe0f5 100%);
  text-align: center;
  padding: 40px 24px 30px;
  border-bottom: 2px solid var(--sky-light);
}
.header-badge {
  display: inline-block;
  font-size: 16px;
  letter-spacing: 3px;
  color: var(--sky);
  border: 1px solid var(--sky);
  padding: 5px 18px;
  border-radius: 100px;
  margin-bottom: 16px;
  background: white;
  font-weight: 500;
}
.header h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(18px, 4.5vw, 26px);
  font-weight: 500;
  line-height: 1.7;
  color: var(--navy);
  margin-bottom: 14px;
}
.header-copy {
  font-size: 18px;
  color: var(--text-mid);
  line-height: 2;
  margin-bottom: 16px;
}
.progress-wrap { margin-top: 18px; }
.progress-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  gap: 8px;
}
.progress-lbl {
  font-size: 15px;
  letter-spacing: 1px;
  color: var(--text-light);
  transition: color 0.3s;
  text-align: center;
  flex: 1;
}
.progress-lbl.active { color: var(--sky); font-weight: 700; }
.progress-lbl.done { color: var(--navy); }
.progress-track {
  height: 4px;
  background: rgba(91,163,217,0.2);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sky), var(--navy));
  border-radius: 4px;
  transition: width 0.5s ease;
  width: 0%;
}
.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 16px 80px;
}
.q-card {
  background: var(--white);
  border-radius: 20px;
  box-shadow: 0 4px 24px var(--shadow);
  border: 1px solid var(--border);
  margin-top: 28px;
  overflow: hidden;
  display: block;
  animation: fadeUp 0.4s ease forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.q-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--sky-pale);
}
.q-num {
  font-size: 16px;
  letter-spacing: 3px;
  color: var(--sky);
  margin-bottom: 6px;
}
.q-text {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(18px, 4.5vw, 22px);
  font-weight: 400;
  line-height: 1.7;
  color: var(--navy);
}

.question-main-instruction {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-mid);
  margin: 2px 0 10px;
}
.q-image-wrap { padding: 16px 16px 0; }
.q-image-wrap img {
  width: 100%;
  max-width: 260px;
  display: block;
  margin: 0 auto;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: white;
  padding: 8px;
}
.opts-1col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 16px;
}
.opt-card {
  border: 2px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.22s ease;
  background: var(--sky-bg);
  text-align: center;
  display: flex;
  flex-direction: column;
}
.opt-card:hover {
  border-color: var(--sky);
  transform: translateY(-3px);
  box-shadow: 0 6px 18px var(--shadow);
}
.opt-card.selected {
  border-color: var(--navy);
  background: var(--sky-pale);
  box-shadow: 0 4px 16px rgba(91,163,217,0.3);
}
.opt-card.text-only {
  padding: 14px 14px 12px;
  text-align: left;
}
.opt-card img {
  width: 100%;
  height: 220px;
  object-fit: contain;
  background: white;
  padding: 12px;
  display: block;
}
.opt-label {
  font-size: 18px;
  color: var(--text-dark);
  padding: 8px 6px 4px;
  font-weight: 600;
  line-height: 1.5;
}
.opt-card.text-only .opt-label { padding: 0 0 6px; }
.opt-desc {
  font-size: 17px;
  color: var(--text-mid);
  padding: 0 6px 10px;
  line-height: 1.6;
}
.opt-card.text-only .opt-desc { padding: 0; }
.opt-check { display: none; color: var(--navy); margin-right: 2px; }
.opt-card.selected .opt-check { display: inline; }
.micro-hint {
  text-align: center;
  font-size: 17px;
  color: var(--text-light);
  padding: 2px 16px 10px;
}
.question-hint {
  text-align: left;
  padding: 8px 0 0;
  font-size: 15px;
  line-height: 1.6;
}
.nav-area {
  padding: 4px 16px 20px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  align-items: center;
}
.btn-back {
  background: transparent;
  color: var(--text-light);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 14px 24px;
  font-size: 18px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}
.btn-next, .btn-copy-code {
  background: linear-gradient(135deg, var(--sky) 0%, var(--navy) 100%);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 16px 36px;
  font-size: 18px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  letter-spacing: 1px;
}
.btn-next:disabled { opacity: 0.35; cursor: not-allowed; }
.loading {
  text-align: center;
  padding: 48px 16px;
  display: none;
  color: var(--text-mid);
  font-size: 16px;
}
#result-section { display: none; }
/* ▼修正：診断結果タイトルの水色ボックスを削除し、文字だけで目立たせる */
.result-title-area {
  background: transparent;
  border: none;
  box-shadow: none;
  border-radius: 0;
  padding: 22px 0 10px;
  margin-top: 20px;
  text-align: center;
}
.result-title-area .result-badge {
  display: inline-block;
  font-family: 'Noto Serif JP', serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--navy);
  background: transparent;
  border: none;
  padding: 0;
  border-radius: 0;
  margin-bottom: 0;
}
.result-hero {
  background: linear-gradient(160deg, #f0f8ff 0%, #d8eef9 60%, #bfe0f5 100%);
  border-radius: 20px;
  padding: 30px 24px 26px;
  margin-top: 28px;
  text-align: center;
  border: 1px solid var(--sky-light);
  box-shadow: 0 4px 24px var(--shadow);
}
.result-badge {
  display: inline-block;
  font-size: 14px;
  letter-spacing: 3px;
  color: var(--sky);
  background: white;
  border: 1px solid var(--border);
  padding: 5px 16px;
  border-radius: 100px;
  margin-bottom: 14px;
}
.result-code { font-size: 17px; color: var(--navy-mid); margin-bottom: 14px; font-weight: 700; }
.result-empathy {
  font-family: 'Noto Serif JP', serif;
  font-size: 17px;
  text-align: left;
  color: var(--navy);
  margin-bottom: 18px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  line-height: 1.9;
  white-space: pre-line;
}
.result-card {
  background: var(--white);
  border-radius: 16px;
  padding: 20px 22px;
  margin-top: 12px;
  box-shadow: 0 2px 12px var(--shadow);
  border: 1px solid var(--border);
  border-left: 4px solid var(--sky);
}
.result-card-title { font-size: 17px; letter-spacing: 1px; color: var(--sky); margin-bottom: 4px; font-weight: 700; }
.result-card-note { font-size: 14px; color: var(--text-light); margin-bottom: 10px; }
.result-card-body { font-size: 17px; text-align: left; line-height: 1.9; color: var(--text-dark); white-space: pre-line; }
.error-card { border-left-color: #d96b5b; }
.error-card .result-card-title { color: #b54637; }
.copy-code-box {
  background: var(--white);
  border-radius: 16px;
  padding: 22px;
  margin-top: 14px;
  box-shadow: 0 2px 12px var(--shadow);
  border: 1px solid var(--border);
  text-align: center;
}
.copy-code-label { font-size: 16px; color: var(--text-mid); margin-bottom: 4px; }
.copy-code-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  background: var(--sky-pale);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}
.line-section {
  background: var(--white);
  border-radius: 16px;
  padding: 26px 22px;
  margin-top: 12px;
  text-align: center;
  box-shadow: 0 2px 12px var(--shadow);
  border: 1px solid var(--border);
}
.line-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 21px;
  color: var(--navy);
  margin-bottom: 10px;
  font-weight: 500;
  line-height: 1.6;
}
.line-q, .line-benefits, .line-note {
  text-align: left;
  white-space: pre-line;
  line-height: 2;
}
.line-note {
  font-size: 12px;
  color: var(--text-light);
  line-height: 1.8;
}
.line-q { font-size: 17px; color: var(--text-mid); margin-bottom: 16px; }
.cta-lead {
  font-size: 17px;
  color: var(--navy);
  font-weight: 700;
  line-height: 1.8;
  margin: 14px 0 12px;
  text-align: center;
}
.line-benefits {
  background: var(--sky-pale);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 16px;
  font-size: 17px;
  color: var(--text-dark);
  border: 1px solid var(--border);
}
.receive-guide-heading {
  display: block;
  text-align: center;
  font-weight: 700;
  margin-bottom: 0;
}
.btn-line {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--line);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 19px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  text-decoration: none;
  width: 100%;
  position: relative;
  z-index: 20;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
}

/* 2026-04-30 fix: コピー・LINEボタンを確実にタップできるようにする */
.line-section, .copy-code-box, .btn-copy-code, .btn-line {
  position: relative;
  z-index: 9999;
  pointer-events: auto !important;
}
#postLead, #postPreviewCards, .preview-wrap, .preview-blur {
  pointer-events: none !important;
}
.btn-copy-code, .btn-line, .fv-cta-button {
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(0,0,0,0);
}

.fv-area, .fv-cta-button {
  position: relative;
  z-index: 9999;
}

.fv-banner, .fv-banner img {
  pointer-events: none !important;
}

.preview-wrap { position: relative; overflow: hidden; }
.preview-wrap::after {
  content: '';
  position: absolute;
  inset: auto 0 0 0;
  height: 70px;
  background: linear-gradient(transparent, white);
  pointer-events: none;
}
.preview-blur { filter: blur(4px); user-select: none; }
.footer {
  text-align: center;
  padding: 40px 0 20px;
  font-size: 16px;
  color: var(--text-light);
}


/* 2026-04-30 update: FVバナー＋CTA。CTAクリック後に診断本体を表示 */
.fv-area {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 10px 24px;
  text-align: center;
  box-sizing: border-box;
}
.fv-banner img { width: 100%; height: auto; display: block; pointer-events: none; }
.fv-cta-note { margin: 14px 0 5px; font-size: 14px; line-height: 1.5; color: #3A5A8C; font-weight: 500; }
.fv-cta-push { display:none !important; margin: 0 0 10px; font-size: 17px; line-height: 1.65; color: #1A2B5C; font-weight: 600; }
.fv-cta-button {
  display: block; width: 100%; max-width: 440px; margin: 0 auto; padding: 17px 18px;
  background: #F28B6B; color: #ffffff; font-size: 18px; font-weight: 700; line-height: 1.4;
  text-align: center; text-decoration: none; border: none; border-radius: 999px;
  box-shadow: 0 5px 14px rgba(0, 0, 0, 0.18); box-sizing: border-box; cursor: pointer;
  position: relative; z-index: 9999; pointer-events: auto; touch-action: manipulation;
  font-family: 'Noto Sans JP', sans-serif;
}
.fv-cta-button:hover { opacity: 0.92; }
@media screen and (max-width: 480px) {
  .fv-area { padding: 0 8px 22px; }
  .fv-cta-note { margin-top: 12px; font-size: 13px; }
  .fv-cta-push { font-size: 16px; margin-bottom: 9px; }
  .fv-cta-button { max-width: 420px; font-size: 17px; padding: 16px 16px; }
}

@media (max-width: 600px) {
  .q-text { font-size: 19px; line-height: 1.8; }
  .opt-label { font-size: 17px; }
  .opt-desc { font-size: 16px; }
  .opt-card img { height: 200px; }
  .btn-next, .btn-copy-code { font-size: 17px; padding: 16px 32px; }
  .btn-back { font-size: 16px; padding: 14px 20px; }
  .result-card-body { font-size: 17px; line-height: 2.1; }
  .header h1 { font-size: 22px; line-height: 1.8; }
  .header-copy { font-size: 16px; line-height: 2.1; }
  .header-badge { font-size: 13px; }
  .progress-lbl { font-size: 12px; }
}

/* CTAクリック後に旧FVが出ないよう、旧ヒーロー文章は常に非表示 */
#heroBlock, #introBlock { display: none !important; }
#diagnosisApp .header { padding: 14px 24px 12px; }
#diagnosisApp .progress-wrap { margin-top: 0; }


/* 2026-05-10 fix: ベース診断見出しと本文冒頭の余白を詰める */
.result-card-title {
  margin-bottom: 2px !important;
}
.result-card-note {
  margin-bottom: 4px !important;
}
.result-card-body {
  padding-top: 0 !important;
}
.result-card-body > br:first-child {
  display: none !important;
}


/* 2026-05-10 スマホ日本語可読性改善 */
.result-card-body,
.pre-result-text,
.result-text,
.result-description {
  line-height: 2.05 !important;
  letter-spacing: 0.02em !important;
  word-break: keep-all !important;
  overflow-wrap: break-word !important;
  line-break: strict !important;
  font-feature-settings: "palt";
}

/* 日本語の句読点折返し改善 */
.result-card-body p,
.pre-result-text p,
.result-text p {
  hanging-punctuation: allow-end;
}

/* スマホ時 */
@media (max-width: 768px) {
  .result-card-body,
  .pre-result-text,
  .result-text,
  .result-description {
    font-size: 16px !important;
    line-height: 2.15 !important;
    letter-spacing: 0.025em !important;
  }
}

</style>
</head>

function getPreResultByCode(code) {
  const handType = code.charAt(0);
  const startType = code.charAt(1);
  const lastType = code.slice(2);

  const foundation = PRE_FOUNDATION_MAP[handType];
  const decision = PRE_DECISION_MAP[startType];
  const third = PRE_THIRD_MAP[lastType];

  if (!foundation || !decision || !third) {
    return null;
  }

  return {
    foundationTitle: foundation.title,
    foundationNote: foundation.note,
    foundationBody: foundation.body,
    decisionTitle: decision.title,
    decisionNote: decision.note,
    decisionBody: decision.body,
    thirdTitle: third.title,
    thirdNote: third.note,
    thirdBody: third.body
  };
}

const answers={q1:'',q2:'',q3:'',q4:''}; let currentQuestionKey='q1';
const questionNumberEl=document.getElementById('questionNumber');
const questionTextEl=document.getElementById('questionText');
const questionImageWrapEl=document.getElementById('questionImageWrap');
const questionImageEl=document.getElementById('questionImage');
const optionsContainerEl=document.getElementById('optionsContainer');
const nextBtnEl=document.getElementById('nextBtn');
const backBtnEl=document.getElementById('backBtn');
const loadingMsgEl=document.getElementById('loadingMsg');
const resultSectionEl=document.getElementById('result-section');
const progressFillEl=document.getElementById('progressFill');
const copyCodeBtnEl=document.getElementById('copyCodeBtn');
function escapeHtml(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function getQuestionConfig(k){return QUESTION_FLOW.find(q=>q.key===k)}
function getQuestionIndex(k){return QUESTION_FLOW.findIndex(q=>q.key===k)}
function isQuestionAnswered(k){return !!answers[k]}
function getNextQuestionKey(k){if(k==='q3')return 'q2'; if(k==='q2')return answers.q3==='M'?'q1':'q4'; if(k==='q4')return 'q1'; if(k==='q1')return null; return null;}
function getPreviousQuestionKey(k){if(k==='q1')return answers.q3==='M'?'q2':'q4'; if(k==='q4')return 'q2'; if(k==='q2')return 'q3'; return null;}
function buildDiagnosisCode(){if(answers.q3==='M') return answers.q1+answers.q2+'M'; return answers.q1+answers.q2+answers.q4;}
function updateIntroVisibility(){
  // 旧FV文章は使わないため、CTAクリック後は常に質問だけを表示します。

  const introBlock = document.getElementById('introBlock');
  const heroBlock = document.getElementById('heroBlock');
  if(introBlock) introBlock.style.display = 'none';
  if(heroBlock) heroBlock.style.display = 'none';
}
function getVisibleFlowKeys(){
  // 表示順に合わせた動的な質問番号用。

  // Q3（マスカケ）で「ある」の場合はQ4を表示しないため、全3問として扱います。

  if(answers.q3 === 'M') return ['q3','q2','q1'];
  return ['q3','q2','q4','q1'];
}
function updateProgress(){
  const flowKeys = getVisibleFlowKeys();
  const currentIndex = Math.max(0, flowKeys.indexOf(currentQuestionKey));
  progressFillEl.style.width = (((currentIndex + 1) / flowKeys.length) * 100) + '%';
  QUESTION_FLOW.forEach((q,i)=>{
    const el=document.getElementById('pl'+(i+1));
    if(!el) return;
    el.className='progress-lbl';
    el.style.display = flowKeys.includes(q.key) ? 'block' : 'none';
    if(isQuestionAnswered(q.key) && q.key!==currentQuestionKey) el.classList.add('done');
    if(q.key===currentQuestionKey) el.classList.add('active');
  });
}
function getNextButtonLabel(k){ if(k==='q1') return '診断結果を見る'; return '次へ進む'; }
function renderQuestion(key){const q=getQuestionConfig(key); currentQuestionKey=key; const flowKeys=getVisibleFlowKeys(); const displayIndex=Math.max(0, flowKeys.indexOf(key))+1; questionNumberEl.textContent=`QUESTION ${String(displayIndex).padStart(2,'0')} / ${String(flowKeys.length).padStart(2,'0')}`; questionTextEl.textContent=q.question; if(q.imageUrl){questionImageWrapEl.style.display='block'; questionImageEl.src=q.imageUrl; questionImageEl.alt=q.question;} else {questionImageWrapEl.style.display='none'; questionImageEl.src='';}
const selectedValue=answers[key]||''; optionsContainerEl.innerHTML=q.choices.map(choice=>{const isSelected=selectedValue===choice.value; const hasImage=!!choice.imageUrl; const hasDesc=!!(choice.description&&choice.description.trim()); return `<div class="opt-card ${hasImage?'':'text-only'} ${isSelected?'selected':''}" onclick="selectChoice('${q.key}','${escapeHtml(choice.value)}',this)">${hasImage?`<img src="${escapeHtml(choice.imageUrl)}" alt="${escapeHtml(choice.label)}">`:''}<div class="opt-label"><span class="opt-check">✓</span>${escapeHtml(choice.label)}</div>${hasDesc?`<div class="opt-desc">${escapeHtml(choice.description)}</div>`:''}</div>`;}).join('');
backBtnEl.style.display=key==='q3'?'none':'inline-block'; nextBtnEl.disabled=!isQuestionAnswered(key); nextBtnEl.textContent=getNextButtonLabel(key); updateProgress(); updateIntroVisibility(); window.scrollTo({top:0, behavior:'smooth'});}
function selectChoice(questionKey,value,clickedElement){ answers[questionKey]=value; optionsContainerEl.querySelectorAll('.opt-card').forEach(card=>card.classList.remove('selected')); clickedElement.classList.add('selected'); nextBtnEl.disabled=false; nextBtnEl.textContent=getNextButtonLabel(questionKey); updateProgress(); }
function goNext(){ if(!isQuestionAnswered(currentQuestionKey)) return; const nextKey=getNextQuestionKey(currentQuestionKey); if(nextKey===null){diagnose(); return;} renderQuestion(nextKey); }
function goBack(){ const prev=getPreviousQuestionKey(currentQuestionKey); if(prev) renderQuestion(prev); }
function formatJapaneseText(text){
  return String(text)
    .replace(/\r\n/g, '\n')
    .replace(/\r/g, '\n')
    .replace(/\n{3,}/g, '\n\n')
    .replace(/\n/g, '<br>')
    .replace(/(<br>){3,}/g, '<br><br>')
    .trim();
}
function normalizeResultText(text){
  return formatJapaneseText(text);
}
function createResultCardHtml(title,note,body,extraClass=''){
  const normalizedNote = note ? normalizeResultText(note) : '';
  const normalizedBody = normalizeResultText(body);
  return `<div class="result-card ${extraClass}"><div class="result-card-title">${escapeHtml(title)}</div>${normalizedNote?`<div class="result-card-note">${normalizedNote}</div>`:''}<div class="result-card-body">${normalizedBody}</div></div>`;
}
function diagnose(){document.getElementById('questionCard').style.display='none'; loadingMsgEl.style.display='block'; progressFillEl.style.width='100%'; setTimeout(()=>{loadingMsgEl.style.display='none'; showResult();},700);}

    createResultCardHtml('あなたを一言で表すと','',postData.oneWord),
    createResultCardHtml('あなたの総合診断結果','',postData.total),
    createResultCardHtml('仕事で活かせる強み','',postData.strength),
    postData.weakness ? createResultCardHtml('つまずきやすいポイント','',postData.weakness) : '',
    createResultCardHtml('自然に前へ進むためのヒント','',postData.hint),
    postData.firstStep ? createResultCardHtml('今すぐ取れる最初の一歩','',postData.firstStep) : ''
  ].join('');

  resultSectionEl.style.display='block';
  window.scrollTo({top:0, behavior:'smooth'});
}

function setCopyButtonDone(){
  if(!copyCodeBtnEl) return;
  copyCodeBtnEl.textContent='✅ コピーしました！';
  setTimeout(()=>{ copyCodeBtnEl.innerHTML='📋 診断コードを<br>コピーする'; },1800);
}

function copyText(text){
  // https環境ではClipboard API、http/埋め込み環境ではtextarea方式にフォールバック
  if(navigator.clipboard && window.isSecureContext){
    return navigator.clipboard.writeText(text).then(setCopyButtonDone).catch(()=>fallbackCopyText(text));
  }
  return fallbackCopyText(text);
}

function fallbackCopyText(text){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.setAttribute('readonly','');
  ta.style.position='fixed';
  ta.style.top='-1000px';
  ta.style.left='-1000px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  ta.setSelectionRange(0,99999);
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  setCopyButtonDone();
}

function copyDiagnosisCodeNow(e){
  if(e){ e.preventDefault(); e.stopPropagation(); }
  copyText(buildDiagnosisCode());
  return false;
}

function openLineNow(e){
  if(e){ e.preventDefault(); e.stopPropagation(); }
  const url='https://lin.ee/OINIB8d';
  const opened=window.open(url, '_blank', 'noopener,noreferrer');
  if(!opened){ window.location.href=url; }
  return false;
}

  if(fvArea) fvArea.style.display = 'none';
  if(diagnosisApp) diagnosisApp.style.display = 'block';

}
const startDiagnosisBtnEl = document.getElementById('startDiagnosisBtn');
if(startDiagnosisBtnEl){ startDiagnosisBtnEl.addEventListener('click', startDiagnosisFromFV); }

nextBtnEl.addEventListener('click',goNext);
backBtnEl.addEventListener('click',goBack);
copyCodeBtnEl.addEventListener('click',copyDiagnosisCodeNow);
const lineBtnEl = document.getElementById('lineBtn');
if (lineBtnEl) { lineBtnEl.addEventListener('click', openLineNow); }
window.copyDiagnosisCodeNow = copyDiagnosisCodeNow;
window.openLineNow = openLineNow;

  answers.q1 = 'B';
  answers.q2 = '2';
  answers.q3 = 'NONE';
  answers.q4 = 'W';
  console.assert(buildDiagnosisCode() === 'B2W', 'Normal code should be B2W');

  answers.q1 = '';
  answers.q2 = '';
  answers.q3 = '';
  answers.q4 = '';
}

window.selectChoice = selectChoice;
runTests();
renderQuestion('q3');
