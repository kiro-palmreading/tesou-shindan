<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>才能コンパス診断</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --sky: #5ba3d9;
  --sky-light: #a8d4f0;
  --sky-pale: #e8f4fc;
  --sky-bg: #f3f9ff;
  --navy: #173a5e;
  --navy-mid: #2a5280;
  --white: #ffffff;
  --text-dark: #173a5e;
  --text-mid: #456a8d;
  --text-light: #7898b5;
  --border: rgba(91, 163, 217, 0.28);
  --shadow: rgba(26, 58, 92, 0.10);
  --line: #06c755;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: linear-gradient(180deg, #eef7ff 0%, #ffffff 40%, #f6fbff 100%);
  color: var(--text-dark);
  font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
  letter-spacing: 0.03em;
  line-height: 1.75;
}

button,
a {
  -webkit-tap-highlight-color: transparent;
}

.fv-area {
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
  padding: 0 0 34px;
  text-align: center;
}

.fv-banner img {
  display: block;
  width: 100%;
  height: auto;
  margin: 0 auto;
}

.fv-cta-button {
  width: calc(100% - 34px);
  max-width: 430px;
  margin: 24px auto 0;
  padding: 18px 18px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(180deg, #ffb84d 0%, #f39a24 100%);
  color: #ffffff;
  font-size: 19px;
  font-weight: 700;
  letter-spacing: 0.04em;
  box-shadow: 0 8px 18px rgba(211, 124, 22, 0.28);
  cursor: pointer;
}

.fv-cta-button:active {
  transform: translateY(1px);
}

#diagnosisApp {
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
  padding: 0 14px 42px;
}

.header {
  padding: 8px 0 10px;
}

.progress-wrap {
  width: 100%;
  margin: 0 auto 14px;
  padding: 14px 12px 12px;
  background: rgba(255,255,255,0.78);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 4px 16px var(--shadow);
}

.progress-labels {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
  margin-bottom: 8px;
}

.progress-lbl {
  font-size: 11px;
  color: var(--text-light);
  text-align: center;
  line-height: 1.4;
}

.progress-lbl.active {
  color: var(--navy);
  font-weight: 700;
}

.progress-track {
  width: 100%;
  height: 8px;
  background: #dceefb;
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  width: 25%;
  height: 100%;
  background: linear-gradient(90deg, var(--sky), var(--sky-light));
  border-radius: 999px;
  transition: width 0.25s ease;
}

.container {
  width: 100%;
}

.q-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 22px 17px 20px;
  box-shadow: 0 6px 24px var(--shadow);
}

.q-num {
  display: inline-block;
  margin-bottom: 12px;
  padding: 5px 12px;
  border-radius: 999px;
  background: var(--sky-pale);
  color: var(--navy-mid);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
}

.question-main-instruction {
  margin-bottom: 12px;
  color: var(--text-mid);
  font-size: 14px;
  line-height: 1.65;
}

.q-text {
  font-family: "Noto Serif JP", serif;
  color: var(--navy);
  font-size: 20px;
  font-weight: 700;
  line-height: 1.65;
  margin-bottom: 16px;
}

.q-image-wrap {
  margin: 10px auto 18px;
  text-align: center;
}

.q-image-wrap img {
  display: block;
  width: 100%;
  max-width: 290px;
  height: auto;
  margin: 0 auto;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: var(--white);
}

.opts-1col {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

.option-btn {
  width: 100%;
  padding: 13px 12px;
  border: 1px solid var(--border);
  border-radius: 17px;
  background: #ffffff;
  color: var(--text-dark);
  text-align: left;
  cursor: pointer;
  box-shadow: 0 3px 12px rgba(26,58,92,0.06);
}

.option-btn.selected {
  border-color: var(--sky);
  background: #eef8ff;
  box-shadow: 0 4px 16px rgba(91,163,217,0.18);
}

.option-layout {
  display: flex;
  gap: 12px;
  align-items: center;
}

.option-img {
  width: 82px;
  min-width: 82px;
  height: 82px;
  object-fit: contain;
  border-radius: 12px;
  background: #ffffff;
  border: 1px solid var(--border);
}

.option-text {
  flex: 1;
}

.option-label {
  display: block;
  font-size: 16px;
  font-weight: 700;
  line-height: 1.55;
  color: var(--navy);
}

.option-desc {
  display: block;
  margin-top: 3px;
  font-size: 13px;
  line-height: 1.55;
  color: var(--text-mid);
}

.nav-area {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}

.btn-back,
.btn-next {
  flex: 1;
  padding: 14px 12px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}

.btn-back {
  border: 1px solid var(--border);
  background: #ffffff;
  color: var(--text-mid);
}

.btn-next {
  border: none;
  background: linear-gradient(180deg, var(--sky) 0%, #3f8fca 100%);
  color: #ffffff;
  box-shadow: 0 5px 15px rgba(91,163,217,0.25);
}

.btn-next:disabled {
  opacity: 0.42;
  cursor: not-allowed;
}

.loading {
  display: none;
  margin: 18px 0;
  padding: 18px 14px;
  text-align: center;
  color: var(--text-mid);
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 18px;
}

#result-section {
  display: none;
}

.result-title-area {
  margin: 12px 0 14px;
  text-align: center;
}

.result-badge {
  display: inline-block;
  padding: 6px 14px;
  background: var(--sky-pale);
  color: var(--navy);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
}

.result-image-wrap {
  margin: 14px 0 14px;
  text-align: center;
}

.result-image-wrap img {
  width: 100%;
  max-width: 640px;
  height: auto;
  display: block;
  margin: 0 auto;
  border-radius: 18px;
  border: 1px solid var(--border);
  box-shadow: 0 4px 20px var(--shadow);
  background: var(--white);
}

.result-image-error,
.external-result-error {
  margin: 14px 0;
  padding: 15px 14px;
  background: #ffffff;
  border: 1px solid var(--border);
  border-left: 4px solid #d96b5b;
  border-radius: 16px;
  color: var(--text-mid);
  font-size: 14px;
  line-height: 1.75;
  text-align: left;
}

.external-result-text {
  margin-top: 10px;
  word-break: normal;
  overflow-wrap: break-word;
  line-break: strict;
}

/* 外部HTML本文内の余白を、スマホで間延びしないように整える */
.external-result-text .result-detail {
  display: block;
}

.external-result-text .result-block {
  margin: 0 0 13px !important;
  padding: 17px 15px !important;
  background: var(--white);
  border: 1px solid var(--border);
  border-left: 4px solid var(--sky);
  border-radius: 17px;
  box-shadow: 0 3px 14px var(--shadow);
  text-align: left;
}

.external-result-text .result-block h2 {
  margin: 0 0 9px !important;
  padding-bottom: 7px !important;
  border-bottom: 1px solid var(--border);
  color: var(--navy);
  font-family: "Noto Serif JP", serif;
  font-size: 18px !important;
  line-height: 1.55 !important;
}

/* 「あなたを一言で表すと」は画像内にあるため非表示 */
.external-result-text .result-block:first-child,
.external-result-text [data-hide-title="true"],
.external-result-text .result-catch,
.external-result-text .one-word,
.external-result-text .catch-copy {
  display: none !important;
}

/* pタグが1文ごとでも、余白で間延びしないようにする */
.external-result-text p {
  margin: 0 0 2px !important;
  padding: 0 !important;
  color: var(--text-dark);
  font-size: 16px !important;
  line-height: 1.76 !important;
  letter-spacing: 0.02em;
}

.external-result-text p + p {
  margin-top: 0 !important;
}

.external-result-text p:empty {
  display: none !important;
}

.external-result-text br + br {
  display: block;
  content: "";
  margin-top: 8px;
}

.external-result-text ul {
  margin: 7px 0 12px !important;
  padding: 0 !important;
  list-style: none;
}

.external-result-text li {
  position: relative;
  margin: 0 0 6px !important;
  padding: 8px 10px 8px 28px !important;
  background: var(--sky-pale);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-dark);
  font-size: 16px !important;
  line-height: 1.72 !important;
}

.external-result-text li::before {
  content: "";
  position: absolute;
  left: 12px;
  top: 1.18em;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--sky);
}

.line-section {
  margin: 18px 0 0;
  padding: 20px 16px 22px;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 22px;
  box-shadow: 0 5px 22px var(--shadow);
  text-align: center;
}

.line-benefits {
  margin: 0 0 16px;
  padding: 14px 13px;
  background: #f3fbf5;
  border: 1px solid rgba(6,199,85,0.22);
  border-radius: 17px;
  color: #245c3a;
  font-size: 14px;
  line-height: 1.78;
  text-align: left;
  white-space: pre-line;
}

.copy-code-box {
  margin: 14px 0 16px;
  padding: 14px;
  border-radius: 18px;
  background: var(--sky-bg);
  border: 1px solid var(--border);
}

.copy-code-label {
  margin-bottom: 5px;
  color: var(--text-mid);
  font-size: 13px;
  font-weight: 700;
}

.copy-code-value {
  margin-bottom: 10px;
  color: var(--navy);
  font-size: 24px;
  font-weight: 800;
  letter-spacing: 0.08em;
}

.btn-copy-code {
  width: 100%;
  max-width: 260px;
  padding: 12px 12px;
  border: none;
  border-radius: 999px;
  background: var(--navy);
  color: #ffffff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}

.cta-lead {
  margin: 12px 0 14px;
  color: var(--text-dark);
  font-size: 15px;
  line-height: 1.75;
  white-space: pre-line;
}

.btn-line {
  display: block;
  width: 100%;
  max-width: 380px;
  margin: 0 auto;
  padding: 16px 14px;
  border-radius: 999px;
  background: var(--line);
  color: #ffffff;
  font-size: 17px;
  font-weight: 800;
  text-decoration: none;
  box-shadow: 0 6px 16px rgba(6,199,85,0.25);
}

.line-note {
  margin: 9px 0 0;
  color: var(--text-light);
  font-size: 12px;
}

.footer {
  margin: 26px 0 0;
  text-align: center;
  color: var(--text-light);
  font-size: 12px;
}

@media (max-width: 600px) {
  body {
    background: #f6fbff;
  }

  .fv-area {
    max-width: 430px;
    padding-bottom: 30px;
  }

  .fv-cta-button {
    margin-top: 22px;
    font-size: 18px;
    padding: 17px 16px;
  }

  #diagnosisApp {
    max-width: 430px;
    padding: 0 12px 38px;
  }

  .q-card {
    padding: 20px 15px 18px;
    border-radius: 20px;
  }

  .q-text {
    font-size: 19px;
  }

  .option-layout {
    gap: 10px;
  }

  .option-img {
    width: 76px;
    min-width: 76px;
    height: 76px;
  }

  .option-label {
    font-size: 15px;
  }

  .option-desc {
    font-size: 12px;
  }

  .result-image-wrap {
    margin: 12px 0 12px;
  }

  .external-result-text {
    margin-top: 8px;
  }

  .external-result-text .result-block {
    margin-bottom: 12px !important;
    padding: 16px 14px !important;
  }

  .external-result-text .result-block h2 {
    font-size: 17px !important;
    margin-bottom: 8px !important;
  }

  .external-result-text p {
    font-size: 15.5px !important;
    line-height: 1.72 !important;
    margin-bottom: 1px !important;
  }

  .external-result-text li {
    font-size: 15.5px !important;
    line-height: 1.7 !important;
  }
}
</style>
</head>

<body>

<section class="fv-area" id="fvArea">
  <div class="fv-banner">
    <img src="image/fv/fv-main.png" alt="才能コンパス診断">
  </div>

  <button id="startDiagnosisBtn" class="fv-cta-button" type="button">
    無料で診断してみる ▶
  </button>
</section>

<div id="diagnosisApp" style="display:none;">
  <div class="header">
    <div class="progress-wrap">
      <div class="progress-labels">
        <span class="progress-lbl" id="pl1">マスカケ</span>
        <span class="progress-lbl" id="pl2">知能線の始点</span>
        <span class="progress-lbl" id="pl3">知能線の伸び</span>
        <span class="progress-lbl" id="pl4">手型</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="q-card" id="questionCard">
      <div class="q-header">
        <div class="q-num" id="questionNumber">QUESTION 01 / 04</div>
        <div class="question-main-instruction">利き手を見ながら、直感で質問に答えてください。</div>
        <div class="q-text" id="questionText"></div>
      </div>

      <div class="q-image-wrap" id="questionImageWrap" style="display:none;">
        <img id="questionImage" src="" alt="">
      </div>

      <div class="opts-1col" id="optionsContainer"></div>

      <div class="nav-area">
        <button class="btn-back" id="backBtn" type="button">戻る</button>
        <button class="btn-next" id="nextBtn" type="button" disabled>次へ進む</button>
      </div>
    </div>

    <div class="loading" id="loadingMsg">診断結果を読み込んでいます...</div>

    <div id="result-section">
      <div class="result-title-area">
        <div class="result-badge">診断結果</div>
      </div>

      <div id="preResultCards">
        <div id="resultImageWrap" class="result-image-wrap"></div>
        <div id="externalResultText" class="external-result-text"></div>
      </div>

      <div class="line-section">
        <div class="line-benefits" id="receiveGuide"></div>

        <div class="copy-code-box">
          <div class="copy-code-label">LINE送信用の診断コード</div>
          <div class="copy-code-value" id="copyCodeValue">---</div>
          <button class="btn-copy-code" id="copyCodeBtn" type="button">診断コードを<br>コピーする</button>
        </div>

        <div class="cta-lead" id="ctaLead"></div>

        <a id="lineBtn" href="https://lin.ee/OINIB8d" class="btn-line" target="_blank" rel="noopener noreferrer">
          あなた専用の診断結果を受け取る
        </a>

        <p class="line-note">※無料・1分で登録できます</p>
      </div>
    </div>

    <div class="footer">ビジネス手相診断士 輝路(kiro) © 2026</div>
  </div>
</div>

<script>
const COMMON_TEXTS = {
  receiveGuide:
`〖診断結果の受け取り方〗

1. 下記の「診断コードをコピーする」ボタンを押す。
2. 「LINE登録に進む」ボタンを押す。
3. LINEでコピーした診断コードを送る。

確認後、順次
トータル診断結果をお届けします。

※ひとつひとつ内容を確認しながらお届けしているため、少しお時間をいただく場合があります。`,

  ctaLead:
`強みを活かして、次の一歩を踏み出したい方は
今すぐ診断結果を受け取ってください。`
};

const IMAGE_ASSETS = {
  Q1_A: "https://cdn.peraichi.com/userData/d6621e34-3268-445c-bb20-ddb971833921/img/8d67ae3b-1e9e-4300-93e1-47a3844163b5/17.png",
  Q1_B: "https://cdn.peraichi.com/userData/d6621e34-3268-445c-bb20-ddb971833921/img/820409af-d9ef-4172-88a0-4e9f63b013dd/21.png",

  Q1_D: "https://cdn.peraichi.com/userData/d6621e34-3268-445c-bb20-ddb971833921/img/19bcce50-e7d7-4f77-a95a-a6cdfddf7bd1/20.png",
  Q1_E: "https://cdn.peraichi.com/userData/d6621e34-3268-445c-bb20-ddb971833921/img/bf039615-601c-4bdc-977d-489815b1796d/18.png",

  Q2_1: "https://cdn.peraichi.com/userData/d6621e34-3268-445c-bb20-ddb971833921/img/910a7806-77f9-465b-9be4-055629b9a200/_________200_x_200_px___19_.png",
  Q2_2: "https://cdn.peraichi.com/userData/d6621e34-3268-445c-bb20-ddb971833921/img/ed029380-714c-013e-0474-0a58a9feac02/2.png",

const QUESTION_FLOW = [
  {
    key: "q3",
    question: "下記のような線がありますか？（マスカケ）",
    imageUrl: "https://cdn.peraichi.com/userData/d6621e34-3268-445c-bb20-ddb971833921/img/eaf70000-69a9-4b09-87aa-c4f83616156e/_________200_x_200_px___11_.png",
    choices: [
      { value: "M", label: "ある", description: "" },

  {

      {

  },
  {
    key: "q1",

    choices: [
      {
        value: "A",
        label: "現実的でタフな手",
        description: "手のひらが正方形に近く、縦横がほぼ同じ長さ／爪が四角い／指は短め／骨太タイプの方によく見られる",
        imageUrl: IMAGE_ASSETS.Q1_A
      },
      {
        value: "B",
        label: "感受性豊かな手",
        description: "手のひらが縦に長い／指先が丸い",
        imageUrl: IMAGE_ASSETS.Q1_B
      },
      {
        value: "C",
        label: "分析好きの手",
        description: "指の関節がはっきりしている／指は比較的長い／骨の目立つ細身体型の方によく見られる",
        imageUrl: IMAGE_ASSETS.Q1_C
      },
      {
        value: "D",
        label: "エネルギッシュな手",
        description: "指先がヘラのように広がっている／手のひらは縦よりも横がやや長い",
        imageUrl: IMAGE_ASSETS.Q1_D
      },
      {
        value: "E",
        label: "感性高い手",
        description: "指は長くて細く、先がとがっている／手は縦に長く、繊細な印象／華奢な細身体型の方によく見られる",
        imageUrl: IMAGE_ASSETS.Q1_E
      }
    ]
  }
];

const state = {
  currentIndex: 0,
  answers: {}
};

const $ = (id) => document.getElementById(id);

$("startDiagnosisBtn").addEventListener("click", () => {
  $("fvArea").style.display = "none";
  $("diagnosisApp").style.display = "block";
  renderQuestion();
  window.scrollTo({ top: 0, behavior: "smooth" });
});

$("backBtn").addEventListener("click", () => {
  if (state.currentIndex === 0) {
    $("diagnosisApp").style.display = "none";
    $("fvArea").style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
    return;
  }

  state.currentIndex--;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: "smooth" });
});

$("nextBtn").addEventListener("click", () => {
  if (!state.answers[QUESTION_FLOW[state.currentIndex].key]) return;

  if (state.currentIndex < QUESTION_FLOW.length - 1) {
    state.currentIndex++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: "smooth" });
  } else {
    showResult();
  }
});

$("copyCodeBtn").addEventListener("click", async () => {
  const code = $("copyCodeValue").textContent.trim();

  try {
    await navigator.clipboard.writeText(code);
    $("copyCodeBtn").innerHTML = "コピーしました";
    setTimeout(() => {
      $("copyCodeBtn").innerHTML = "診断コードを<br>コピーする";
    }, 1600);
  } catch (e) {
    alert("コピーできない場合は、診断コードを長押ししてコピーしてください。");
  }
});

function renderQuestion() {
  const q = QUESTION_FLOW[state.currentIndex];

  $("questionCard").style.display = "block";
  $("result-section").style.display = "none";
  $("loadingMsg").style.display = "none";

  $("questionNumber").textContent = `QUESTION ${String(state.currentIndex + 1).padStart(2, "0")} / 04`;
  $("questionText").textContent = q.question;

  const progress = ((state.currentIndex + 1) / QUESTION_FLOW.length) * 100;
  $("progressFill").style.width = `${progress}%`;

  for (let i = 1; i <= 4; i++) {
    $("pl" + i).classList.toggle("active", i === state.currentIndex + 1);
  }

  if (q.imageUrl) {
    $("questionImageWrap").style.display = "block";
    $("questionImage").src = q.imageUrl;
    $("questionImage").alt = q.question;
  } else {
    $("questionImageWrap").style.display = "none";
    $("questionImage").src = "";
  }

  $("optionsContainer").innerHTML = "";

  q.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "option-btn";
    if (state.answers[q.key] === choice.value) {
      btn.classList.add("selected");
    }

    const hasImage = !!choice.imageUrl;

    btn.innerHTML = `
      <span class="option-layout">
        ${hasImage ? `<img class="option-img" src="${choice.imageUrl}" alt="${escapeHtml(choice.label)}">` : ""}
        <span class="option-text">
          <span class="option-label">${escapeHtml(choice.label)}</span>
          ${choice.description ? `<span class="option-desc">${escapeHtml(choice.description)}</span>` : ""}
        </span>
      </span>
    `;

    btn.addEventListener("click", () => {
      state.answers[q.key] = choice.value;
      $("nextBtn").disabled = false;

      document.querySelectorAll(".option-btn").forEach(el => el.classList.remove("selected"));
      btn.classList.add("selected");
    });

    $("optionsContainer").appendChild(btn);
  });

  $("nextBtn").disabled = !state.answers[q.key];
  $("nextBtn").textContent = state.currentIndex === QUESTION_FLOW.length - 1 ? "診断結果を見る" : "次へ進む";
}

function buildResultCode() {
  const handType = state.answers.q1;
  const start = state.answers.q2;
  const masakake = state.answers.q3;
  const end = state.answers.q4;

  if (masakake === "M") {
    return `${handType}${start}M`;
  }

  return `${handType}${start}${end}`;
}

async function showResult() {
  const code = buildResultCode();

  $("questionCard").style.display = "none";
  $("loadingMsg").style.display = "block";
  $("result-section").style.display = "none";

  $("copyCodeValue").textContent = code;
  $("receiveGuide").textContent = COMMON_TEXTS.receiveGuide;
  $("ctaLead").textContent = COMMON_TEXTS.ctaLead;

  renderResultImage(code);
  await loadExternalResultText(code);

  $("loadingMsg").style.display = "none";
  $("result-section").style.display = "block";

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function renderResultImage(code) {
  const wrap = $("resultImageWrap");
  wrap.innerHTML = "";

  const img = document.createElement("img");
  img.src = `image/results/${code}.png`;
  img.alt = `${code}の診断結果`;

  img.onerror = () => {
    wrap.innerHTML = `
      <div class="result-image-error">
        診断結果画像を読み込めませんでした。<br>
        image/results/${code}.png がGitHubにアップロードされているか確認してください。
      </div>
    `;
  };

  wrap.appendChild(img);
}

async function loadExternalResultText(code) {
  const target = $("externalResultText");
  target.innerHTML = "";

  try {
    const response = await fetch(`results/${code}.html`, { cache: "no-store" });

    if (!response.ok) {
      throw new Error("HTML file not found");
    }

    const html = await response.text();
    const cleaned = cleanExternalHtml(html);
    target.innerHTML = cleaned;

  } catch (error) {
    target.innerHTML = `
      <div class="external-result-error">
        診断結果本文を読み込めませんでした。<br>
        results/${code}.html がGitHubにアップロードされているか確認してください。
      </div>
    `;
  }
}

function cleanExternalHtml(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, "text/html");

  doc.querySelectorAll("script, style").forEach(el => el.remove());

  const body = doc.body || doc;

  removeOneWordBlock(body);

  return body.innerHTML;
}

function removeOneWordBlock(root) {
  const blocks = Array.from(root.querySelectorAll(".result-block"));

  blocks.forEach(block => {
    const text = block.textContent.replace(/\s+/g, "");
    if (
      text.includes("あなたを一言で表すと") ||
      text.includes("あなたをひと言で表すと")
    ) {
      block.remove();
    }
  });

  Array.from(root.querySelectorAll("h1, h2, h3, p, div")).forEach(el => {
    const text = el.textContent.replace(/\s+/g, "");
    if (
      text === "あなたを一言で表すと" ||
      text === "あなたをひと言で表すと"
    ) {
      const parentBlock = el.closest(".result-block");
      if (parentBlock) {
        parentBlock.remove();
      } else {
        el.remove();
      }
    }
  });
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
