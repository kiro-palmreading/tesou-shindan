<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375">
<title>才能コンパス診断</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

:root {
  --sky: #5ba3d9;
  --sky-light: #a8d4f0;
  --sky-pale: #e8f4fc;
  --sky-bg: #f0f8ff;
  --navy: #1a3a5c;
  --navy-mid: #2a5280;
  --white: #ffffff;
  --text-dark: #1a3a5c;
  --text-mid: #4a6a8a;
  --text-light: #7a9ab8;
  --border: rgba(91,163,217,0.28);
  --shadow: rgba(91,163,217,0.14);
  --line: #06C755;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--sky-bg);
  color: var(--text-dark);
  min-height: 100vh;
  font-size: 18px;
  -webkit-text-size-adjust: none;
  text-size-adjust: none;
}

/* ===== FV ===== */
.fv-area {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 10px 26px;
  text-align: center;
  box-sizing: border-box;
}

.fv-banner img {
  width: 100%;
  height: auto;
  display: block;
  pointer-events: none;
}

.fv-cta-button {
  display: block;
  width: 100%;
  max-width: 440px;
  margin: 24px auto 0;
  padding: 17px 18px;
  background: linear-gradient(135deg, #ff9a5a 0%, #f26b3a 100%);
  color: #ffffff;
  font-size: 18px;
  font-weight: 700;
  line-height: 1.4;
  text-align: center;
  text-decoration: none;
  border: none;
  border-radius: 999px;
  box-shadow: 0 6px 16px rgba(242, 107, 58, 0.32);
  box-sizing: border-box;
  cursor: pointer;
  position: relative;
  z-index: 9999;
  pointer-events: auto;
  touch-action: manipulation;
  font-family: 'Noto Sans JP', sans-serif;
}

.fv-cta-button:hover {
  opacity: 0.92;
}

/* ===== 診断本体 ===== */
.header {
  background: linear-gradient(160deg, #f0f8ff 0%, #d8eef9 50%, #bfe0f5 100%);
  text-align: center;
  padding: 14px 24px 12px;
  border-bottom: 2px solid var(--sky-light);
}

.progress-wrap {
  margin-top: 0;
}

.progress-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  gap: 8px;
}

.progress-lbl {
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--text-light);
  transition: color 0.3s;
  text-align: center;
  flex: 1;
}

.progress-lbl.active {
  color: var(--sky);
  font-weight: 700;
}

.progress-lbl.done {
  color: var(--navy);
}

.progress-track {
  height: 4px;
  background: rgba(91,163,217,0.2);
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sky), var(--navy));
  border-radius: 4px;
  transition: width 0.5s ease;
  width: 0%;
}

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

.q-card {
  background: var(--white);
  border-radius: 20px;
  box-shadow: 0 4px 24px var(--shadow);
  border: 1px solid var(--border);
  margin-top: 28px;
  overflow: hidden;
  display: block;
  animation: fadeUp 0.4s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

.q-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--sky-pale);
}

.q-num {
  font-size: 16px;
  letter-spacing: 3px;
  color: var(--sky);
  margin-bottom: 6px;
}

.question-main-instruction {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-mid);
  margin: 2px 0 10px;
}

.q-text {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(18px, 4.5vw, 22px);
  font-weight: 400;
  line-height: 1.7;
  color: var(--navy);
}

.q-image-wrap {
  padding: 16px 16px 0;
}

.q-image-wrap img {
  width: 100%;
  max-width: 260px;
  display: block;
  margin: 0 auto;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: white;
  padding: 8px;
}

/* 見本コード準拠：選択肢は縦型カード */
.opts-1col {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 16px;
}

.opt-card {
  border: 2px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.22s ease;
  background: var(--sky-bg);
  text-align: center;
  display: flex;
  flex-direction: column;
}

.opt-card:hover {
  border-color: var(--sky);
  transform: translateY(-3px);
  box-shadow: 0 6px 18px var(--shadow);
}

.opt-card.selected {
  border-color: var(--navy);
  background: var(--sky-pale);
  box-shadow: 0 4px 16px rgba(91,163,217,0.3);
}

.opt-card.text-only {
  padding: 14px 14px 12px;
  text-align: left;
}

.opt-card img {
  width: 100%;
  height: 220px;
  object-fit: contain;
  background: white;
  padding: 12px;
  display: block;
}

.opt-label {
  font-size: 18px;
  color: var(--text-dark);
  padding: 8px 6px 4px;
  font-weight: 600;
  line-height: 1.5;
}

.opt-card.text-only .opt-label {
  padding: 0 0 6px;
}

.opt-desc {
  font-size: 17px;
  color: var(--text-mid);
  padding: 0 6px 10px;
  line-height: 1.6;
}

.opt-card.text-only .opt-desc {
  padding: 0;
}

.opt-check {
  display: none;
  color: var(--navy);
  margin-right: 2px;
}

.opt-card.selected .opt-check {
  display: inline;
}

.nav-area {
  padding: 4px 16px 20px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  align-items: center;
}

.btn-back {
  background: transparent;
  color: var(--text-light);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 14px 24px;
  font-size: 18px;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
}

.btn-next,
.btn-copy-code {
  background: linear-gradient(135deg, var(--sky) 0%, var(--navy) 100%);
  color: white;
  border: none;
  border-radius: 50px;
  padding: 16px 36px;
  font-size: 18px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  letter-spacing: 1px;
}

.btn-next:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

.loading {
  text-align: center;
  padding: 48px 16px;
  display: none;
  color: var(--text-mid);
  font-size: 16px;
}

#result-section {
  display: none;
}

/* ===== 診断結果 ===== */
.result-title-area {
  background: transparent;
  border: none;
  box-shadow: none;
  border-radius: 0;
  padding: 22px 0 10px;
  margin-top: 20px;
  text-align: center;
}

.result-title-area .result-badge {
  display: inline-block;
  font-family: 'Noto Serif JP', serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--navy);
  background: transparent;
  border: none;
  padding: 0;
  border-radius: 0;
  margin-bottom: 0;
}

.result-image-wrap {
  margin-top: 18px;
  text-align: center;
}

.result-image-wrap img {
  width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;
  border-radius: 18px;
  border: 1px solid var(--border);
  background: white;
  box-shadow: 0 4px 24px var(--shadow);
}

.result-card,
.external-result-text .result-block,
.external-result-text section,
.external-result-text article {
  background: var(--white);
  border-radius: 16px;
  padding: 22px 22px;
  margin-top: 16px;
  box-shadow: 0 2px 12px var(--shadow);
  border: 1px solid var(--border);
  border-left: 4px solid var(--sky);
}

.result-card-title,
.external-result-text h2,
.external-result-text h3 {
  font-size: 17px;
  letter-spacing: 1px;
  color: var(--sky);
  margin-bottom: 8px;
  font-weight: 700;
  line-height: 1.7;
}

.result-card-note {
  font-size: 14px;
  color: var(--text-light);
  margin-bottom: 10px;
}

.result-card-body {
  font-size: 17px;
  text-align: left;
  line-height: 2.05;
  color: var(--text-dark);
  white-space: pre-line;
}

/* 外部HTML本文：見本コード寄せ。詰めすぎず、塊の余白を残す */
.external-result-text {
  margin-top: 14px;
  text-align: left;
}

.external-result-text .result-block:first-child,
.external-result-text [data-hide-title="true"],
.external-result-text .result-catch,
.external-result-text .one-word,
.external-result-text .catch-copy {
  display: none !important;
}

.external-result-text .result-block {
  margin-top: 16px !important;
  margin-bottom: 0 !important;
}

.external-result-text .result-block h2,
.external-result-text .result-block h3 {
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px !important;
}

.external-result-text p {
  font-size: 17px;
  line-height: 2.05;
  color: var(--text-dark);
  margin: 0 0 10px;
  padding: 0;
}

.external-result-text p + p {
  margin-top: 0;
}

.external-result-text p:empty {
  display: block;
  height: 12px;
  margin: 0;
}

.external-result-text br + br {
  display: block;
  content: "";
  margin-top: 12px;
}

.external-result-text ul {
  list-style: none;
  margin: 12px 0 8px;
  padding: 0;
}

.external-result-text li {
  font-size: 17px;
  line-height: 1.9;
  color: var(--text-dark);
  background: var(--sky-pale);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  margin-bottom: 9px;
}

.external-result-error,
.result-image-error {
  background: var(--white);
  border-radius: 16px;
  padding: 20px 22px;
  margin-top: 16px;
  box-shadow: 0 2px 12px var(--shadow);
  border: 1px solid var(--border);
  border-left: 4px solid #d96b5b;
  color: var(--text-mid);
  font-size: 16px;
  line-height: 1.9;
  text-align: left;
}

/* ===== LINE導線 ===== */
.copy-code-box {
  background: var(--white);
  border-radius: 16px;
  padding: 22px;
  margin-top: 14px;
  box-shadow: 0 2px 12px var(--shadow);
  border: 1px solid var(--border);
  text-align: center;
}

.copy-code-label {
  font-size: 16px;
  color: var(--text-mid);
  margin-bottom: 4px;
}

.copy-code-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  background: var(--sky-pale);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 14px;
  letter-spacing: 2px;
}

.line-section {
  background: var(--white);
  border-radius: 16px;
  padding: 26px 22px;
  margin-top: 18px;
  text-align: center;
  box-shadow: 0 2px 12px var(--shadow);
  border: 1px solid var(--border);
}

.line-benefits,
.line-note {
  text-align: left;
  white-space: pre-line;
  line-height: 2;
}

.line-benefits {
  background: var(--sky-pale);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 16px;
  font-size: 17px;
  color: var(--text-dark);
  border: 1px solid var(--border);
}

.cta-lead {
  font-size: 17px;
  color: var(--navy);
  font-weight: 700;
  line-height: 1.8;
  margin: 14px 0 12px;
  text-align: center;
  white-space: pre-line;
}

.btn-line {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--line);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 20px 24px;
  font-size: 19px;
  font-weight: 700;
  font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer;
  text-decoration: none;
  width: 100%;
  position: relative;
  z-index: 20;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
}

.line-note {
  font-size: 12px;
  color: var(--text-light);
  line-height: 1.8;
  margin-top: 10px;
}

.line-section,
.copy-code-box,
.btn-copy-code,
.btn-line {
  position: relative;
  z-index: 9999;
  pointer-events: auto !important;
}

.btn-copy-code,
.btn-line,
.fv-cta-button {
  touch-action: manipulation;
  -webkit-tap-highlight-color: rgba(0,0,0,0);
}

.footer {
  text-align: center;
  padding: 40px 0 20px;
  font-size: 16px;
  color: var(--text-light);
}

@media screen and (max-width: 480px) {
  .fv-area {
    padding: 0 8px 24px;
  }

  .fv-cta-button {
    max-width: 420px;
    margin-top: 22px;
    font-size: 17px;
    padding: 16px 16px;
  }
}

@media (max-width: 600px) {
  .q-text {
    font-size: 19px;
    line-height: 1.8;
  }

  .opt-label {
    font-size: 17px;
  }

  .opt-desc {
    font-size: 16px;
  }

  .opt-card img {
    height: 200px;
  }

  .btn-next,
  .btn-copy-code {
    font-size: 17px;
    padding: 16px 32px;
  }

  .btn-back {
    font-size: 16px;
    padding: 14px 20px;
  }

  .result-card-body,
  .external-result-text p {
    font-size: 17px;
    line-height: 2.05;
  }

  .external-result-text .result-block,
  .external-result-text section,
  .external-result-text article {
    padding: 20px 18px;
    margin-top: 17px !important;
  }

  .external-result-text p {
    margin-bottom: 11px;
  }

  .external-result-text p:empty {
    height: 13px;
  }
}
</style>
</head>

<body>

<!-- FVバナー＋CTAエリア -->
<section class="fv-area" id="fvArea">
  <div class="fv-banner">
    <img src="image/fv/fv-main.png" alt="才能コンパス診断">
  </div>

  <button id="startDiagnosisBtn" class="fv-cta-button" type="button">
    無料で診断してみる ▶
  </button>
</section>

<!-- 診断本体：最初は非表示 -->
<div id="diagnosisApp" style="display:none;">
  <div class="header">
    <div class="progress-wrap">
      <div class="progress-labels">
        <span class="progress-lbl" id="pl1">マスカケ</span>
        <span class="progress-lbl" id="pl2">知能線の始点</span>
        <span class="progress-lbl" id="pl3">知能線の伸び</span>
        <span class="progress-lbl" id="pl4">手型</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="q-card" id="questionCard">
      <div class="q-header">
        <div class="q-num" id="questionNumber">QUESTION 01 / 04</div>

        <div class="question-main-instruction">
          利き手を見ながら、直感で質問に答えてください。
        </div>

        <div class="q-text" id="questionText"></div>
      </div>

      <div class="q-image-wrap" id="questionImageWrap" style="display:none;">
        <img id="questionImage" src="" alt="">
      </div>

      <div class="opts-1col" id="optionsContainer"></div>

      <div class="nav-area">
        <button class="btn-back" id="backBtn" type="button">戻る</button>
        <button class="btn-next" id="nextBtn" type="button" disabled>次へ進む</button>
      </div>
    </div>

    <div class="loading" id="loadingMsg">診断結果を読み込んでいます...</div>

    <div id="result-section">
      <div class="result-title-area">
        <div class="result-badge">診断結果</div>
      </div>

      <div id="preResultCards">
        <div id="resultImageWrap" class="result-image-wrap"></div>
        <div id="externalResultText" class="external-result-text"></div>
      </div>

      <div class="line-section">
        <div class="line-benefits" id="receiveGuide"></div>

        <div class="copy-code-box">
          <div class="copy-code-label">LINE送信用の診断コード</div>
          <div class="copy-code-value" id="copyCodeValue">---</div>
          <button class="btn-copy-code" id="copyCodeBtn" type="button">診断コードを<br>コピーする</button>
        </div>

        <div class="cta-lead" id="ctaLead"></div>

        <a id="lineBtn" href="https://lin.ee/OINIB8d" class="btn-line" target="_blank" rel="noopener noreferrer">
          あなた専用の診断結果を受け取る
        </a>

        <p class="line-note">※無料・1分で登録できます</p>
      </div>

      <div class="footer">ビジネス手相診断士 輝路(kiro) © 2026</div>
    </div>
  </div>
</div>

<script>
const COMMON_TEXTS = {

確認後、順次
トータル診断結果をお届けします。

※ひとつひとつ内容を確認しながらお届けしているため、少しお時間をいただく場合があります。`,

  Q1_C: "https://cdn.peraichi.com/userData/d6621e34-3268-445c-bb20-ddb971833921/img/bbd8991d-8ead-45d8-a7ae-0dc8ce25e549/19.png",
  Q1_D: "https://cdn.peraichi.com/userData/d6621e34-3268-445c-bb20-ddb971833921/img/19bcce50-e7d7-4f77-a95a-a6cdfddf7bd1/20.png",
  Q1_E: "https://cdn.peraichi.com/userData/d6621e34-3268-445c-bb20-ddb971833921/img/bf039615-601c-4bdc-977d-489815b1796d/18.png",

      {

      {

let answers = {};
let currentQuestionKey = 'q3';

const fvAreaEl = document.getElementById('fvArea');
const diagnosisAppEl = document.getElementById('diagnosisApp');
const startDiagnosisBtnEl = document.getElementById('startDiagnosisBtn');
const questionCardEl = document.getElementById('questionCard');
const questionNumberEl = document.getElementById('questionNumber');
const questionTextEl = document.getElementById('questionText');
const questionImageWrapEl = document.getElementById('questionImageWrap');
const questionImageEl = document.getElementById('questionImage');
const optionsContainerEl = document.getElementById('optionsContainer');
const backBtnEl = document.getElementById('backBtn');
const nextBtnEl = document.getElementById('nextBtn');
const loadingMsgEl = document.getElementById('loadingMsg');
const resultSectionEl = document.getElementById('result-section');
const progressFillEl = document.getElementById('progressFill');
const resultImageWrapEl = document.getElementById('resultImageWrap');
const externalResultTextEl = document.getElementById('externalResultText');
const receiveGuideEl = document.getElementById('receiveGuide');
const ctaLeadEl = document.getElementById('ctaLead');
const copyCodeValueEl = document.getElementById('copyCodeValue');
const copyCodeBtnEl = document.getElementById('copyCodeBtn');

startDiagnosisBtnEl.addEventListener('click', function() {
  fvAreaEl.style.display = 'none';
  diagnosisAppEl.style.display = 'block';
  renderQuestion('q3');
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

backBtnEl.addEventListener('click', goBack);
nextBtnEl.addEventListener('click', goNext);

copyCodeBtnEl.addEventListener('click', async function() {
  const code = copyCodeValueEl.textContent.trim();

  try {
    await navigator.clipboard.writeText(code);
    copyCodeBtnEl.innerHTML = 'コピーしました';
    setTimeout(function() {
      copyCodeBtnEl.innerHTML = '診断コードを<br>コピーする';
    }, 1600);
  } catch (error) {
    alert('コピーできない場合は、診断コードを長押ししてコピーしてください。');
  }
});

function getQuestionConfig(key) {
  return QUESTION_FLOW.find(q => q.key === key);
}

function isQuestionAnswered(key) {
  return !!answers[key];
}

function getVisibleFlowKeys() {
  if (answers.q3 === 'M') {
    return ['q3', 'q2', 'q1'];
  }

  return ['q3', 'q2', 'q4', 'q1'];
}

function getNextQuestionKey(key) {
  if (key === 'q3') return 'q2';
  if (key === 'q2') return answers.q3 === 'M' ? 'q1' : 'q4';
  if (key === 'q4') return 'q1';
  return null;
}

function getPreviousQuestionKey(key) {
  if (key === 'q1') return answers.q3 === 'M' ? 'q2' : 'q4';
  if (key === 'q4') return 'q2';
  if (key === 'q2') return 'q3';
  return null;
}

function getNextButtonLabel(key) {
  if (key === 'q1') return '診断結果を見る';
  return '次へ進む';
}

function updateProgress() {
  const flowKeys = getVisibleFlowKeys();
  const currentIndex = Math.max(0, flowKeys.indexOf(currentQuestionKey));

  progressFillEl.style.width = (((currentIndex + 1) / flowKeys.length) * 100) + '%';

  QUESTION_FLOW.forEach((q, i) => {
    const el = document.getElementById('pl' + (i + 1));
    if (!el) return;

    el.className = 'progress-lbl';
    el.style.display = flowKeys.includes(q.key) ? 'block' : 'none';

    if (isQuestionAnswered(q.key) && q.key !== currentQuestionKey) {
      el.classList.add('done');
    }

    if (q.key === currentQuestionKey) {
      el.classList.add('active');
    }
  });
}

function renderQuestion(key) {
  const q = getQuestionConfig(key);
  currentQuestionKey = key;

  const flowKeys = getVisibleFlowKeys();
  const displayIndex = Math.max(0, flowKeys.indexOf(key)) + 1;

  questionCardEl.style.display = 'block';
  resultSectionEl.style.display = 'none';
  loadingMsgEl.style.display = 'none';

  questionNumberEl.textContent = `QUESTION ${String(displayIndex).padStart(2, '0')} / ${String(flowKeys.length).padStart(2, '0')}`;
  questionTextEl.textContent = q.question;

  if (q.imageUrl) {
    questionImageWrapEl.style.display = 'block';
    questionImageEl.src = q.imageUrl;
    questionImageEl.alt = q.question;
  } else {
    questionImageWrapEl.style.display = 'none';
    questionImageEl.src = '';
  }

  const selectedValue = answers[key] || '';

  optionsContainerEl.innerHTML = q.choices.map(choice => {
    const isSelected = selectedValue === choice.value;
    const hasImage = !!choice.imageUrl;
    const hasDesc = !!(choice.description && choice.description.trim());

    return `
      <div class="opt-card ${hasImage ? '' : 'text-only'} ${isSelected ? 'selected' : ''}" onclick="selectChoice('${q.key}', '${escapeHtml(choice.value)}', this)">
        ${hasImage ? `<img src="${escapeHtml(choice.imageUrl)}" alt="${escapeHtml(choice.label)}">` : ''}
        <div class="opt-label"><span class="opt-check">✓</span>${escapeHtml(choice.label)}</div>
        ${hasDesc ? `<div class="opt-desc">${escapeHtml(choice.description)}</div>` : ''}
      </div>
    `;
  }).join('');

  backBtnEl.style.display = key === 'q3' ? 'none' : 'inline-block';
  nextBtnEl.disabled = !isQuestionAnswered(key);
  nextBtnEl.textContent = getNextButtonLabel(key);

  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectChoice(questionKey, value, clickedElement) {
  answers[questionKey] = value;

  if (questionKey === 'q3' && value === 'M') {
    delete answers.q4;
  }

  optionsContainerEl.querySelectorAll('.opt-card').forEach(card => {
    card.classList.remove('selected');
  });

  clickedElement.classList.add('selected');
  nextBtnEl.disabled = false;
  nextBtnEl.textContent = getNextButtonLabel(questionKey);

  updateProgress();
}

function goNext() {
  if (!isQuestionAnswered(currentQuestionKey)) return;

  const nextKey = getNextQuestionKey(currentQuestionKey);

  if (nextKey === null) {
    diagnose();
    return;
  }

  renderQuestion(nextKey);
}

function goBack() {
  const prevKey = getPreviousQuestionKey(currentQuestionKey);

  if (prevKey) {
    renderQuestion(prevKey);
  }
}

function buildDiagnosisCode() {
  if (answers.q3 === 'M') {
    return answers.q1 + answers.q2 + 'M';
  }

  return answers.q1 + answers.q2 + answers.q4;
}

function diagnose() {
  questionCardEl.style.display = 'none';
  loadingMsgEl.style.display = 'block';
  progressFillEl.style.width = '100%';

  setTimeout(function() {
    loadingMsgEl.style.display = 'none';
    showResult();
  }, 500);
}

async function showResult() {
  const code = buildDiagnosisCode();

  copyCodeValueEl.textContent = code;
  receiveGuideEl.textContent = COMMON_TEXTS.receiveGuide;
  ctaLeadEl.textContent = COMMON_TEXTS.ctaLead;

  renderResultImage(code);
  await loadExternalResultText(code);

  resultSectionEl.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderResultImage(code) {
  resultImageWrapEl.innerHTML = '';

  const img = document.createElement('img');
  img.src = `image/results/${code}.png`;
  img.alt = `${code}の診断結果`;

  img.onerror = function() {
    resultImageWrapEl.innerHTML = `
      <div class="result-image-error">
        診断結果画像を読み込めませんでした。<br>
        image/results/${escapeHtml(code)}.png がGitHubにアップロードされているか確認してください。
      </div>
    `;
  };

  resultImageWrapEl.appendChild(img);
}

async function loadExternalResultText(code) {
  externalResultTextEl.innerHTML = '';

  try {
    const response = await fetch(`results/${code}.html`, { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('HTML file not found');
    }

    const html = await response.text();
    externalResultTextEl.innerHTML = cleanExternalHtml(html);

  } catch (error) {
    externalResultTextEl.innerHTML = `
      <div class="external-result-error">
        診断結果本文を読み込めませんでした。<br>
        results/${escapeHtml(code)}.html がGitHubにアップロードされているか確認してください。
      </div>
    `;
  }
}

function cleanExternalHtml(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  doc.querySelectorAll('script, style').forEach(el => el.remove());

  const body = doc.body || doc;

  removeOneWordBlock(body);
  normalizeEmptyParagraphs(body);

  return body.innerHTML;
}

function removeOneWordBlock(root) {
  const blocks = Array.from(root.querySelectorAll('.result-block'));

  blocks.forEach(block => {
    const text = block.textContent.replace(/\s+/g, '');

    if (
      text.includes('あなたを一言で表すと') ||
      text.includes('あなたをひと言で表すと')
    ) {
      block.remove();
    }
  });

  Array.from(root.querySelectorAll('h1, h2, h3, p, div')).forEach(el => {
    const text = el.textContent.replace(/\s+/g, '');

    if (
      text === 'あなたを一言で表すと' ||
      text === 'あなたをひと言で表すと'
    ) {
      const parentBlock = el.closest('.result-block');

      if (parentBlock) {
        parentBlock.remove();
      } else {
        el.remove();
      }
    }
  });
}

function normalizeEmptyParagraphs(root) {
  Array.from(root.querySelectorAll('p')).forEach(p => {
    const text = p.textContent.replace(/\s+/g, '');

    if (!text) {
      p.innerHTML = '&nbsp;';
    }
  });
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}
